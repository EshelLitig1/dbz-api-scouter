name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Step 1: create the GitHub release once ───────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "DBZ API Scouter ${{ github.ref_name }}" \
            --generate-notes \
            --draft=false \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2: build + upload artifacts (all 3 platforms in parallel) ───────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Build Vite app
        run: npm run build

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Package app (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Package app (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never

      - name: Package app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts to release
        shell: bash
        run: |
          echo "Contents of dist-app:"
          find dist-app -type f | head -30 || true
          count=0
          while IFS= read -r -d '' f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
            count=$((count + 1))
          done < <(find dist-app -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" \) -print0)
          if [ "$count" -eq 0 ]; then
            echo "No artifacts found!"
            exit 1
          fi
          echo "Uploaded $count artifact(s)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
