name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 for actions

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Build Vite app
        run: npm run build

      # ── Icon generation ──────────────────────────────────────────
      - name: Generate icons (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          # ImageMagick is pre-installed on GitHub Actions runners
          # PNG 256x256 (Linux AppImage)
          magick build/icon.svg -resize 256x256 build/icon.png
          # ICNS (macOS) — needs a set of sizes inside an iconset folder
          mkdir -p build/icon.iconset
          for size in 16 32 64 128 256 512; do
            magick build/icon.svg -resize ${size}x${size} build/icon.iconset/icon_${size}x${size}.png
            magick build/icon.svg -resize $((size*2))x$((size*2)) build/icon.iconset/icon_${size}x${size}@2x.png
          done
          # iconutil is macOS-only; on Linux we just need the PNG
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            iconutil -c icns build/icon.iconset -o build/icon.icns
          fi

      - name: Generate icons (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Install Inkscape via choco to convert SVG→PNG, then use ImageMagick for ICO
          choco install inkscape -y --no-progress | Out-Null
          $inkscape = "C:\Program Files\Inkscape\bin\inkscape.exe"
          & $inkscape --export-filename="build\icon_256.png" --export-width=256 --export-height=256 "build\icon.svg"
          & $inkscape --export-filename="build\icon_128.png" --export-width=128 --export-height=128 "build\icon.svg"
          & $inkscape --export-filename="build\icon_64.png"  --export-width=64  --export-height=64  "build\icon.svg"
          & $inkscape --export-filename="build\icon_48.png"  --export-width=48  --export-height=48  "build\icon.svg"
          & $inkscape --export-filename="build\icon_32.png"  --export-width=32  --export-height=32  "build\icon.svg"
          & $inkscape --export-filename="build\icon_16.png"  --export-width=16  --export-height=16  "build\icon.svg"
          # Combine PNGs into a multi-resolution ICO using magick (ImageMagick 7)
          magick build\icon_256.png build\icon_128.png build\icon_64.png build\icon_48.png build\icon_32.png build\icon_16.png build\icon.ico

      # ── Platform packaging ────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Package app (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package app (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
