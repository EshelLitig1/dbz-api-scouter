<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bg)" stroke="#ff6600" stroke-width="4"/>

  <!-- Glow effect -->
  <circle cx="128" cy="128" r="90" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Scouter lens - main circle -->
  <circle cx="128" cy="128" r="72" fill="none" stroke="#ff8800" stroke-width="3" opacity="0.9"/>
  <circle cx="128" cy="128" r="60" fill="rgba(255,136,0,0.08)" stroke="#ffd700" stroke-width="1.5"/>

  <!-- Inner lens rings -->
  <circle cx="128" cy="128" r="45" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.6"/>
  <circle cx="128" cy="128" r="28" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4"/>

  <!-- Cross-hairs -->
  <line x1="128" y1="68" x2="128" y2="188" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="68" y1="128" x2="188" y2="128" stroke="#ff8800" stroke-width="1" opacity="0.5"/>

  <!-- Diagonal cross-hairs -->
  <line x1="85" y1="85" x2="171" y2="171" stroke="#ffd700" stroke-width="0.8" opacity="0.3"/>
  <line x1="171" y1="85" x2="85" y2="171" stroke="#ffd700" stroke-width="0.8" opacity="0.3"/>

  <!-- Center power dot -->
  <circle cx="128" cy="128" r="8" fill="#ffd700"/>
  <circle cx="128" cy="128" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Scouter frame arm (top-right) -->
  <path d="M 185 85 Q 210 70 225 55" stroke="#ff8800" stroke-width="5" fill="none" stroke-linecap="round"/>
  <rect x="218" y="48" width="18" height="10" rx="3" fill="#ff6600" stroke="#ffd700" stroke-width="1"/>

  <!-- Power level readout lines (top-right area) -->
  <line x1="198" y1="72" x2="215" y2="65" stroke="#00c8ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="201" y1="78" x2="218" y2="71" stroke="#00c8ff" stroke-width="1" opacity="0.6"/>
  <line x1="204" y1="84" x2="221" y2="77" stroke="#00c8ff" stroke-width="0.8" opacity="0.4"/>

  <!-- Ki energy dots around lens -->
  <circle cx="128" cy="56" r="3" fill="#ffd700" opacity="0.8"/>
  <circle cx="200" cy="128" r="3" fill="#ffd700" opacity="0.8"/>
  <circle cx="128" cy="200" r="3" fill="#ffd700" opacity="0.8"/>
  <circle cx="56" cy="128" r="3" fill="#ffd700" opacity="0.8"/>

  <!-- Corner brackets -->
  <path d="M 72 76 L 62 76 L 62 86" stroke="#ff8800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 184 76 L 194 76 L 194 86" stroke="#ff8800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 72 180 L 62 180 L 62 170" stroke="#ff8800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 184 180 L 194 180 L 194 170" stroke="#ff8800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
